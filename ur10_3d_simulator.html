
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#container { width: 100%; padding: 1rem 0; }
canvas { display: block; width: 100%; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: #0a0a14; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
.joint-ctrl { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.joint-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; display: flex; justify-content: space-between; }
.joint-label span { font-weight: 500; color: var(--color-text-primary); }
input[type=range] { width: 100%; }
.btns { display: flex; gap: 8px; margin-top: 10px; }
button { flex: 1; padding: 8px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
button:hover { background: var(--color-background-secondary); }
.info { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; }
</style>
<div id="container">
<canvas id="c" height="420"></canvas>
<div class="controls">
<div class="joint-ctrl">
  <div class="joint-label">Joint 1 — Base <span id="v0">0°</span></div>
  <input type="range" min="-180" max="180" value="0" step="1" id="j0">
</div>
<div class="joint-ctrl">
  <div class="joint-label">Joint 2 — Shoulder <span id="v1">-90°</span></div>
  <input type="range" min="-180" max="180" value="-90" step="1" id="j1">
</div>
<div class="joint-ctrl">
  <div class="joint-label">Joint 3 — Elbow <span id="v2">90°</span></div>
  <input type="range" min="-180" max="180" value="90" step="1" id="j2">
</div>
<div class="joint-ctrl">
  <div class="joint-label">Joint 4 — Wrist 1 <span id="v3">0°</span></div>
  <input type="range" min="-180" max="180" value="0" step="1" id="j3">
</div>
<div class="joint-ctrl">
  <div class="joint-label">Joint 5 — Wrist 2 <span id="v4">0°</span></div>
  <input type="range" min="-180" max="180" value="0" step="1" id="j4">
</div>
<div class="joint-ctrl">
  <div class="joint-label">Joint 6 — Wrist 3 <span id="v5">0°</span></div>
  <input type="range" min="-180" max="180" value="0" step="1" id="j5">
</div>
</div>
<div class="btns">
  <button onclick="setHome()">Home</button>
  <button onclick="setReady()">Ready pose</button>
  <button onclick="animatePick()">Pick & place</button>
  <button onclick="randomPose()">Random</button>
</div>
<div class="info" id="info">Drag sliders to control joints · Drag canvas to orbit</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x0a0a14, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 2, 0.01, 100);
camera.position.set(1.2, 1.0, 1.5);
camera.lookAt(0, 0.4, 0);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(2, 3, 2);
dir.castShadow = true;
scene.add(dir);
const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
fill.position.set(-2, 1, -1);
scene.add(fill);

const grid = new THREE.GridHelper(2, 20, 0x222244, 0x111122);
scene.add(grid);

const MAT_BODY = new THREE.MeshPhongMaterial({ color: 0x1a3a5c, shininess: 80 });
const MAT_JOINT = new THREE.MeshPhongMaterial({ color: 0x2a5a8c, shininess: 120 });
const MAT_EE = new THREE.MeshPhongMaterial({ color: 0xe85a30, shininess: 100 });
const MAT_BASE = new THREE.MeshPhongMaterial({ color: 0x111122, shininess: 40 });

function makeCylinder(rt, rb, h, mat, rx=0, ry=0, rz=0) {
  const g = new THREE.CylinderGeometry(rt, rb, h, 16);
  const m = new THREE.Mesh(g, mat);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true;
  return m;
}
function makeBox(w, h, d, mat) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, mat);
  m.castShadow = true;
  return m;
}
function makeSphere(r, mat) {
  const g = new THREE.SphereGeometry(r, 16, 16);
  const m = new THREE.Mesh(g, mat);
  m.castShadow = true;
  return m;
}

const L = [0, 0.127, 0.612, 0.572, 0.0, 0.0, 0.115];
const joints = [];
const pivots = [];

function buildRobot() {
  const base = makeCylinder(0.09, 0.11, 0.08, MAT_BASE);
  base.position.y = 0.04;
  scene.add(base);

  const basePlate = makeCylinder(0.13, 0.13, 0.02, MAT_BASE);
  basePlate.position.y = 0.01;
  scene.add(basePlate);

  const p0 = new THREE.Object3D();
  p0.position.y = 0.08;
  scene.add(p0);
  pivots.push(p0);

  const j0g = makeCylinder(0.08, 0.08, 0.12, MAT_JOINT, Math.PI/2, 0, 0);
  j0g.position.y = 0.06;
  p0.add(j0g);

  const link1 = makeCylinder(0.06, 0.06, L[2], MAT_BODY);
  link1.position.y = L[2]/2 + 0.12;
  p0.add(link1);

  const p1 = new THREE.Object3D();
  p1.position.y = L[2] + 0.12;
  p0.add(p1);
  pivots.push(p1);

  const j1g = makeCylinder(0.065, 0.065, 0.10, MAT_JOINT, 0, 0, Math.PI/2);
  p1.add(j1g);

  const link2 = makeCylinder(0.055, 0.055, L[3], MAT_BODY);
  link2.position.y = L[3]/2;
  p1.add(link2);

  const p2 = new THREE.Object3D();
  p2.position.y = L[3];
  p1.add(p2);
  pivots.push(p2);

  const j2g = makeCylinder(0.06, 0.06, 0.09, MAT_JOINT, 0, 0, Math.PI/2);
  p2.add(j2g);

  const link3 = makeCylinder(0.04, 0.04, 0.20, MAT_BODY);
  link3.position.y = 0.10;
  p2.add(link3);

  const p3 = new THREE.Object3D();
  p3.position.y = 0.20;
  p2.add(p3);
  pivots.push(p3);

  const j3g = makeCylinder(0.045, 0.045, 0.08, MAT_JOINT, Math.PI/2, 0, 0);
  p3.add(j3g);

  const link4 = makeCylinder(0.035, 0.035, 0.12, MAT_BODY);
  link4.position.y = 0.06;
  p3.add(link4);

  const p4 = new THREE.Object3D();
  p4.position.y = 0.12;
  p3.add(p4);
  pivots.push(p4);

  const j4g = makeCylinder(0.04, 0.04, 0.07, MAT_JOINT, 0, 0, Math.PI/2);
  p4.add(j4g);

  const link5 = makeCylinder(0.03, 0.03, 0.09, MAT_BODY);
  link5.position.y = 0.045;
  p4.add(link5);

  const p5 = new THREE.Object3D();
  p5.position.y = 0.09;
  p4.add(p5);
  pivots.push(p5);

  const j5g = makeCylinder(0.035, 0.035, 0.06, MAT_JOINT, Math.PI/2, 0, 0);
  p5.add(j5g);

  const ee = makeCylinder(0.04, 0.025, 0.06, MAT_EE);
  ee.position.y = 0.05;
  p5.add(ee);

  const f1 = makeBox(0.01, 0.04, 0.005, MAT_EE);
  f1.position.set(0.025, 0.09, 0);
  p5.add(f1);
  const f2 = makeBox(0.01, 0.04, 0.005, MAT_EE);
  f2.position.set(-0.025, 0.09, 0);
  p5.add(f2);
}

buildRobot();

const angles = [0, -Math.PI/2, Math.PI/2, 0, 0, 0];
const axes = [
  new THREE.Vector3(0,1,0),
  new THREE.Vector3(0,0,1),
  new THREE.Vector3(0,0,1),
  new THREE.Vector3(1,0,0),
  new THREE.Vector3(0,0,1),
  new THREE.Vector3(1,0,0),
];

function updateRobot() {
  pivots.forEach((p, i) => {
    p.quaternion.setFromAxisAngle(axes[i], angles[i]);
  });
}
updateRobot();

const sliders = [0,1,2,3,4,5].map(i => document.getElementById('j'+i));
const vals = [0,1,2,3,4,5].map(i => document.getElementById('v'+i));

sliders.forEach((s, i) => {
  s.addEventListener('input', () => {
    angles[i] = parseFloat(s.value) * Math.PI / 180;
    vals[i].textContent = s.value + '°';
    updateRobot();
  });
});

function setHome() {
  const a = [0, -90, 90, 0, 0, 0];
  a.forEach((v, i) => { sliders[i].value = v; angles[i] = v * Math.PI/180; vals[i].textContent = v+'°'; });
  updateRobot();
}
function setReady() {
  const a = [0, -60, 60, -90, 90, 0];
  a.forEach((v, i) => { sliders[i].value = v; angles[i] = v * Math.PI/180; vals[i].textContent = v+'°'; });
  updateRobot();
}
function randomPose() {
  const a = [0,1,2,3,4,5].map(() => Math.round((Math.random()-0.5)*160));
  a.forEach((v, i) => { sliders[i].value = v; angles[i] = v * Math.PI/180; vals[i].textContent = v+'°'; });
  updateRobot();
}

let animating = false;
function animatePick() {
  if (animating) return;
  animating = true;
  document.getElementById('info').textContent = 'Running pick & place sequence...';
  const seq = [
    [0,-90,90,0,0,0],
    [45,-60,80,-90,90,0],
    [45,-80,100,-90,90,0],
    [45,-60,80,-90,90,0],
    [-45,-60,80,-90,90,0],
    [-45,-80,100,-90,90,0],
    [-45,-60,80,-90,90,0],
    [0,-90,90,0,0,0],
  ];
  let step = 0;
  function next() {
    if (step >= seq.length) { animating = false; document.getElementById('info').textContent = 'Drag sliders to control joints · Drag canvas to orbit'; return; }
    const target = seq[step++];
    const start = angles.map(a => a * 180/Math.PI);
    let t = 0;
    const dur = 40;
    function tick() {
      t++;
      const f = t/dur;
      const ease = f < 0.5 ? 2*f*f : -1+(4-2*f)*f;
      target.forEach((v, i) => {
        const val = Math.round(start[i] + (v - start[i]) * ease);
        sliders[i].value = val;
        angles[i] = val * Math.PI/180;
        vals[i].textContent = val+'°';
      });
      updateRobot();
      if (t < dur) requestAnimationFrame(tick);
      else setTimeout(next, 200);
    }
    tick();
  }
  next();
}

let dragging = false, lastX = 0, lastY = 0;
let theta = 0.8, phi = 0.6, radius = 2.2;
canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  theta -= (e.clientX - lastX) * 0.01;
  phi = Math.max(0.1, Math.min(Math.PI/2, phi - (e.clientY - lastY) * 0.01));
  lastX = e.clientX; lastY = e.clientY;
  camera.position.set(
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi) + 0.4,
    radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0.5, 0);
});
canvas.addEventListener('wheel', e => {
  radius = Math.max(1, Math.min(4, radius + e.deltaY * 0.005));
  camera.position.set(
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi) + 0.4,
    radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0.5, 0);
});

function resize() {
  const w = canvas.clientWidth;
  const h = 420;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
